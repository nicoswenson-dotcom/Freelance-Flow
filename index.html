          </div>
          <div className="px-5 grid grid-cols-3 gap-2 mb-4">
            <Card className="p-3">
              <div className="text-[10px] font-semibold text-sage-700 uppercase">Income</div>
              <div className="text-base font-bold mt-1">{money(p.income)}</div>
            </Card>
            <Card className="p-3">
              <div className="text-[10px] font-semibold text-ink uppercase">Expenses</div>
              <div className="text-base font-bold mt-1">{money(p.expenses)}</div>
            </Card>
            <Card className="p-3">
              <div className="text-[10px] font-semibold text-brand-700 uppercase">Net</div>
              <div className={`text-base font-bold mt-1 ${p.net >= 0 ? 'text-ink' : 'text-pop-700'}`}>{money(p.net)}</div>
            </Card>
          </div>
          <div className="px-5">
            <Card className="p-2">
              {list.map(t => <TransactionRow key={t.id} t={t} onClick={() => openTransaction(t.id)} />)}
            </Card>
          </div>
          {mergeFrom && (
            <MergeIntoDialog from={mergeFrom} options={otherProjects} label="project"
              onClose={() => setMergeFrom(null)}
              onConfirm={(to) => { mergeProjects(mergeFrom, to); setMergeFrom(null); setActiveProject(to); }} />
          )}
        </>
      );
    }

    // ---- Venue detail view ----
    if (activeVenue) {
      const v = venues.find(x => x.name === activeVenue);
      if (!v) { setActiveVenue(null); return null; }
      const list = transactions.filter(t => v.ids.includes(t.id));
      const venueEvents = events.filter(e => v.eventIds.includes(e.id));
      const otherVenues = venues.map(x => x.name);
      return (
        <>
          <div className="px-5 pt-6 pb-3 flex items-center gap-3">
            <button onClick={() => setActiveVenue(null)} className="w-10 h-10 rounded-full hover:bg-cream flex items-center justify-center">
              <Icon name="arrowLeft" className="w-5 h-5" />
            </button>
            <div className="flex-1">
              <div className="text-xs text-mute">Venue</div>
              <h1 className="text-xl font-bold text-ink">{v.name}</h1>
            </div>
            {venues.length > 1 && (
              <button type="button" onClick={() => setMergeFrom(v.name)}
                className="inline-flex items-center gap-1.5 px-3 h-9 rounded-lg bg-paper border border-ink/15 text-ink text-sm font-medium hover:bg-cream transition">
                <Icon name="building" className="w-4 h-4" /> Merge
              </button>
            )}
          </div>
          <div className="px-5 grid grid-cols-3 gap-2 mb-4">
            <Card className="p-3">
              <div className="text-[10px] font-semibold text-sage-700 uppercase">Income</div>
              <div className="text-base font-bold mt-1">{money(v.income)}</div>
            </Card>
            <Card className="p-3">
              <div className="text-[10px] font-semibold text-ink uppercase">Expenses</div>
              <div className="text-base font-bold mt-1">{money(v.expenses)}</div>
            </Card>
            <Card className="p-3">
              <div className="text-[10px] font-semibold text-brand-700 uppercase">Net</div>
              <div className={`text-base font-bold mt-1 ${v.net >= 0 ? 'text-ink' : 'text-pop-700'}`}>{money(v.net)}</div>
            </Card>
          </div>
          <div className="px-5 space-y-3">
            {list.length > 0 && (
              <Card className="p-2">
                {list.map(t => <TransactionRow key={t.id} t={t} onClick={() => openTransaction(t.id)} />)}
              </Card>
            )}
            {venueEvents.length > 0 && (
              <Card className="p-3">
                <div className="text-xs font-semibold text-mute uppercase tracking-wider mb-2">Events at this venue</div>
                {venueEvents.map(e => (
                  <div key={e.id} className="py-2 border-b border-ink/5 last:border-0">
                    <div className="text-sm font-medium text-ink">{e.title}</div>
                    <div className="text-xs text-mute">{formatDate(e.date)}{e.start_time ? ` · ${e.start_time}` : ''}</div>
                  </div>
                ))}
              </Card>
            )}
          </div>
          {mergeFrom && (
            <MergeIntoDialog from={mergeFrom} options={otherVenues} label="venue"
              onClose={() => setMergeFrom(null)}
              onConfirm={(to) => { mergeVenues(mergeFrom, to); setMergeFrom(null); setActiveVenue(to); }} />
          )}
        </>
      );
    }

    // ---- List view with tab toggle ----
    const list = tab === 'projects' ? projects : venues;
    const emptyCopy = tab === 'projects'
      ? 'Tag transactions with a project name to see them grouped here'
      : 'Tag a transaction or event with a venue to see it grouped here';

    return (
      <>
        <PageHeader
          title={tab === 'projects' ? 'Projects' : 'Venues'}
          subtitle={tab === 'projects' ? 'Grouped by client or project tag' : 'Grouped by location'}
          onAdd={() => setPage('add')}
        />
        <div className="px-5 mb-4">
          <div className="bg-cream p-1 rounded-xl flex h-12">
            <button onClick={() => setTab('projects')}
              className={`flex-1 rounded-lg font-medium text-sm transition ${tab === 'projects' ? 'bg-white shadow-sm text-ink' : 'text-mute'}`}>
              Projects
            </button>
            <button onClick={() => setTab('venues')}
              className={`flex-1 rounded-lg font-medium text-sm transition ${tab === 'venues' ? 'bg-white shadow-sm text-ink' : 'text-mute'}`}>
              Venues
            </button>
          </div>
        </div>
        <div className="px-5 space-y-3">
          {list.length === 0 ? (
            <Card className="p-8 text-center">
              <div className="w-14 h-14 rounded-2xl bg-cream text-mute/70 flex items-center justify-center mx-auto mb-3">
                <Icon name={tab === 'projects' ? 'folder' : 'building'} className="w-7 h-7" />
              </div>
              <p className="text-mute font-medium">No {tab} yet</p>
              <p className="text-sm text-mute mt-1">{emptyCopy}</p>
            </Card>
          ) : list.map(p => (
            <button key={p.name}
              onClick={() => tab === 'projects' ? setActiveProject(p.name) : setActiveVenue(p.name)}
              className="w-full text-left">
              <Card className="p-4 hover:shadow-md transition">
                <div className="flex items-start justify-between mb-3">
                  <div className="flex items-center gap-2">
                    <div className="w-9 h-9 rounded-xl bg-brand-100 text-brand-600 flex items-center justify-center">
                      <Icon name={tab === 'projects' ? 'folder' : 'building'} className="w-5 h-5" />
                    </div>
                    <div>
                      <div className="font-semibold text-ink">{p.name}</div>
                      <div className="text-xs text-mute">
                        {p.ids.length} transaction{p.ids.length !== 1 ? 's' : ''}
                        {tab === 'venues' && p.eventIds && p.eventIds.length > 0 && ` · ${p.eventIds.length} event${p.eventIds.length !== 1 ? 's' : ''}`}
                      </div>
                    </div>
                  </div>
                  <div className={`font-bold ${p.net >= 0 ? 'text-sage-700' : 'text-pop-700'}`}>{money(p.net)}</div>
                </div>
                <div className="grid grid-cols-2 gap-2 text-xs">
                  <div className="flex items-center justify-between bg-sage-50 rounded-lg px-2 py-1.5">
                    <span className="text-sage-700">Income</span>
                    <span className="font-semibold text-sage-700">{money(p.income)}</span>
                  </div>
                  <div className="flex items-center justify-between bg-cream rounded-lg px-2 py-1.5">
                    <span className="text-ink">Expenses</span>
                    <span className="font-semibold text-ink">{money(p.expenses)}</span>
                  </div>
                </div>
              </Card>
            </button>
          ))}
        </div>
      </>
    );
  };

  // ========================================================================
  // Settings Page
  // ========================================================================
  const Settings = ({ setPage }) => {
    const { settings, updateSettings, transactions } = useApp();
    const [form, setForm] = useState(settings);
    const [saved, setSaved] = useState(false);
    const [confirmReset, setConfirmReset] = useState(false);

    const save = (e) => {
      e.preventDefault();
      updateSettings(form);
      setSaved(true);
      setTimeout(() => setSaved(false), 1800);
    };

    const exportCSV = () => {
      const headers = ['Date','Type','Title','Amount','Tips','Category','Payment Method','Project','Notes'];
      const rows = transactions.map(t => [
        t.date,
        t.type,
        (t.title || '').replace(/"/g, '""'),
        Number(t.amount || 0).toFixed(2),
        t.type === 'income' ? Number(t.tips || 0).toFixed(2) : '',
        t.category || '',
        t.payment_method || '',
        (t.project || '').replace(/"/g, '""'),
        (t.notes || '').replace(/"/g, '""').replace(/\n/g, ' '),
      ].map(v => `"${v}"`).join(','));
      const csv = [headers.join(','), ...rows].join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `freelanceflow-export-${todayISO()}.csv`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    };

    const resetAll = () => {
      localStorage.removeItem('ff_transactions');
      localStorage.removeItem('ff_events');
      localStorage.removeItem('ff_settings');
      window.location.reload();
    };

    return (
      <>
        <PageHeader title="Settings" subtitle="Preferences and data" onAdd={() => setPage('add')} />
        <div className="px-5 space-y-4">
          <Card className="p-4 flex items-center gap-3">
            <div className="w-12 h-12 rounded-xl bg-brand-100 text-brand-600 flex items-center justify-center">
              <Icon name="user" className="w-6 h-6" />
            </div>
            <div className="flex-1">
              <div className="font-semibold text-ink">{settings.business_name || 'Your business'}</div>
              <div className="text-xs text-mute">Data stored locally on this device</div>
            </div>
          </Card>

          <form onSubmit={save} className="space-y-4">
            <Card className="p-4 space-y-4">
              <h3 className="font-semibold text-ink">Profile</h3>
              <div><Label>Business name</Label>
                <Input value={form.business_name || ''} onChange={e => setForm({ ...form, business_name: e.target.value })} placeholder="e.g. Your Name Photography" />
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div><Label>Currency</Label>
                  <Input value={form.currency || '$'} onChange={e => setForm({ ...form, currency: e.target.value })} maxLength={3} />
                </div>
                <div><Label>Tax Rate %</Label>
                  <Input type="number" step="0.1" min="0" value={form.tax_rate || 0} onChange={e => setForm({ ...form, tax_rate: Number(e.target.value) })} />
                </div>
              </div>
              <div><Label>Default Payment Method</Label>
                <Select value={form.default_payment_method} onChange={e => setForm({ ...form, default_payment_method: e.target.value })}>
                  {PAYMENT_METHODS.map(p => <option key={p.value} value={p.value}>{p.label}</option>)}
                </Select>
              </div>
              <Button type="submit" className="w-full">
                {saved ? <><Icon name="check" className="w-5 h-5" /> Saved!</> : 'Save settings'}
              </Button>
            </Card>
          </form>

          <Card className="p-4">
            <h3 className="font-semibold text-ink mb-1">Export</h3>
            <p className="text-sm text-mute mb-3">Download all your transactions as a CSV file.</p>
            <Button variant="secondary" onClick={exportCSV} className="w-full">
              <Icon name="download" className="w-5 h-5" /> Export to CSV
            </Button>
          </Card>

          <Card className="p-4 border-pop-100 bg-pop-50/50">
            <h3 className="font-semibold text-pop-700 mb-1">Danger zone</h3>
            <p className="text-sm text-mute mb-3">Delete all transactions, events, and settings on this device. This cannot be undone.</p>
            <Button variant="dangerGhost" className="w-full border border-pop-100 bg-white" onClick={() => setConfirmReset(true)}>
              Reset all data
            </Button>
          </Card>
        </div>
        <ConfirmDialog open={confirmReset} onClose={() => setConfirmReset(false)} onConfirm={resetAll}
          title="Reset all data?" message="This will delete every transaction, event, and setting on this device. There's no undo." confirmLabel="Delete everything" />
      </>
    );
  };

  // ========================================================================
  // Transaction Detail Modal
  // ========================================================================
  const TransactionDetail = ({ transactionId, onClose }) => {
    const { transactions, updateTransaction, deleteTransaction, money } = useApp();
    // ALWAYS derive from live cache — never snapshot
    const t = transactions.find(x => x.id === transactionId) || null;
    const [editing, setEditing] = useState(false);
    const [editData, setEditData] = useState(null);
    const [confirmDel, setConfirmDel] = useState(false);
    const [receiptThumb, setReceiptThumb] = useState(null);
    const [viewingReceipt, setViewingReceipt] = useState(false);

    useEffect(() => {
      let cancelled = false;
      if (t && t.type === 'expense' && t.has_receipt) {
        getReceipt(t.id).then(src => { if (!cancelled) setReceiptThumb(src); }).catch(() => {});
      } else {
        setReceiptThumb(null);
      }
      return () => { cancelled = true; };
    }, [t && t.id, t && t.has_receipt]);

    useEffect(() => {
      if (!t && transactionId) onClose && onClose();
    }, [t, transactionId, onClose]);

    const startEdit = () => {
      setEditData({
        title: t.title || '',
        amount: t.amount || '',
        tips: t.tips || 0,
        date: t.date,
        payment_method: t.payment_method || 'bank_transfer',
        category: t.category || 'other',
        project: t.project || '',
        venue: t.venue || '',
        linked_to_income_id: t.linked_to_income_id || '',
        notes: t.notes || '',
      });
      setEditing(true);
    };

    const save = () => {
      const patch = t.type === 'income' ? {
        title: editData.title.trim(), amount: Number(editData.amount),
        tips: Number(editData.tips || 0), date: editData.date,
        payment_method: editData.payment_method, project: editData.project.trim() || null,
        venue: editData.venue.trim() || null,
        notes: editData.notes.trim() || null,
      } : {
        title: editData.title.trim(), amount: Number(editData.amount),
        date: editData.date, category: editData.category,
        project: editData.project.trim() || null,
        venue: editData.venue.trim() || null,
        linked_to_income_id: editData.linked_to_income_id || null,
        notes: editData.notes.trim() || null,
      };
      updateTransaction(t.id, patch);
      setEditing(false); setEditData(null);
    };

    const doDelete = () => {
      deleteTransaction(t.id);
      setConfirmDel(false);
      onClose && onClose();
    };

    if (!t) return null;
    const isIncome = t.type === 'income';
    const total = isIncome ? incomeTotal(t) : Number(t.amount || 0);

    const Row = ({ icon, label, value }) => (
      <div className="flex items-start gap-3 py-3 border-b border-ink/10 last:border-0">
        <div className="w-9 h-9 rounded-xl bg-cream text-mute flex items-center justify-center shrink-0">
          <Icon name={icon} className="w-4 h-4" />
        </div>
        <div className="flex-1 min-w-0">
          <div className="text-xs text-mute">{label}</div>
          <div className="text-sm font-medium text-ink break-words">{value}</div>
        </div>
      </div>
    );

    return (
      <Modal open={true} onClose={onClose} title={null}>
        <div className="overflow-y-auto">
          <div className="p-5 border-b border-ink/10">
            <div className="flex items-center justify-between mb-2">
              <Badge variant={isIncome ? 'income' : 'expense'}>{isIncome ? 'Income' : 'Expense'}</Badge>
              <div className="flex items-center gap-1">
                {!editing && (
                  <button onClick={startEdit} className="w-9 h-9 rounded-full hover:bg-cream flex items-center justify-center text-mute">
                    <Icon name="edit" className="w-4 h-4" />
                  </button>
                )}
                {!editing && (
                  <button onClick={() => setConfirmDel(true)} className="w-9 h-9 rounded-full hover:bg-pop-50 flex items-center justify-center text-pop-700">
                    <Icon name="trash" className="w-4 h-4" />
                  </button>
                )}
                <button onClick={onClose} className="w-9 h-9 rounded-full hover:bg-cream flex items-center justify-center text-mute">
                  <Icon name="x" className="w-5 h-5" />
                </button>
              </div>
            </div>
            <div className="text-lg font-semibold text-ink">{t.title}</div>
            <div className={`text-3xl font-bold mt-1 ${isIncome ? 'text-sage-700' : 'text-ink'}`}>
              {isIncome ? '+' : '−'}{money(total)}
            </div>
            {isIncome && Number(t.tips) > 0 && (
              <div className="text-sm text-mute mt-1">
                {money(t.amount)} + {money(t.tips)} tips
              </div>
            )}
          </div>

          <div className="p-5">
            {!editing ? (
              <>
                <Row icon="calendar" label="Date" value={formatDate(t.date)} />
                {isIncome ? (
                  <Row icon="wallet" label="Payment method" value={PAYMENT_METHODS.find(p => p.value === t.payment_method)?.label || '—'} />
                ) : (
                  <Row icon="receipt" label="Category" value={CATEGORIES.find(c => c.value === t.category)?.label || '—'} />
                )}
                <Row icon="folder" label="Project / Client" value={t.project || '—'} />
                <Row icon="building" label="Venue" value={t.venue || '—'} />
                {!isIncome && t.linked_to_income_id && (() => {
                  const linked = transactions.find(x => x.id === t.linked_to_income_id);
                  return <Row icon="dollar" label="Linked income" value={linked ? `${linked.title} · ${formatDate(linked.date)}` : '—'} />;
                })()}
                <Row icon="edit" label="Notes" value={t.notes || '—'} />
                {!isIncome && t.has_receipt && (
                  <div className="pt-3">
                    <div className="text-xs text-mute mb-2 flex items-center gap-1.5">
                      <Icon name="image" className="w-3.5 h-3.5" /> Receipt
                    </div>
                    <button type="button" onClick={() => setViewingReceipt(true)}
                      className="block w-full rounded-xl overflow-hidden bg-cream border border-ink/10 hover:border-ink/25 transition">
                      {receiptThumb ? (
                        <img src={receiptThumb} alt="Receipt" className="w-full max-h-64 object-contain bg-cream" />
                      ) : (
                        <div className="h-32 flex items-center justify-center text-mute text-sm">Loading…</div>
                      )}
                    </button>
                  </div>
                )}
              </>
            ) : (
              <div className="space-y-3">
                <div><Label>Title</Label>
                  <Input value={editData.title} onChange={e => setEditData({ ...editData, title: e.target.value })} />
                </div>
                <div className="grid grid-cols-2 gap-2">
                  <div><Label>Amount</Label>
                    <Input type="number" step="0.01" value={editData.amount} onChange={e => setEditData({ ...editData, amount: e.target.value })} />
                  </div>
                  {isIncome && (
                    <div><Label>Tips</Label>
                      <Input type="number" step="0.01" value={editData.tips} onChange={e => setEditData({ ...editData, tips: e.target.value })} />
                    </div>
                  )}
                </div>
                <div><Label>Date</Label>
                  <Input type="date" value={editData.date} onChange={e => setEditData({ ...editData, date: e.target.value })} />
                </div>
                {isIncome ? (
                  <div><Label>Payment method</Label>
                    <Select value={editData.payment_method} onChange={e => setEditData({ ...editData, payment_method: e.target.value })}>
                      {PAYMENT_METHODS.map(p => <option key={p.value} value={p.value}>{p.label}</option>)}
                    </Select>
                  </div>
                ) : (
                  <div><Label>Category</Label>
                    <Select value={editData.category} onChange={e => setEditData({ ...editData, category: e.target.value })}>
                      {CATEGORIES.map(c => <option key={c.value} value={c.value}>{c.label}</option>)}
                    </Select>
                  </div>
                )}
                <div><Label>Project</Label>
                  <Input value={editData.project} onChange={e => setEditData({ ...editData, project: e.target.value })} />
                </div>
                <div><Label>Venue</Label>
                  <Input value={editData.venue} onChange={e => setEditData({ ...editData, venue: e.target.value })} />
                </div>
                {!isIncome && (
                  <div><Label>Link to income</Label>
                    <Select value={editData.linked_to_income_id} onChange={e => setEditData({ ...editData, linked_to_income_id: e.target.value })}>
                      <option value="">— None —</option>
                      {transactions.filter(x => x.type === 'income').map(i => (
                        <option key={i.id} value={i.id}>{i.title} · {formatDate(i.date)}</option>
                      ))}
                    </Select>
                  </div>
                )}
                <div><Label>Notes</Label>
                  <Textarea value={editData.notes} onChange={e => setEditData({ ...editData, notes: e.target.value })} />
                </div>
                <div className="flex gap-2 pt-2">
                  <Button variant="secondary" className="flex-1" onClick={() => { setEditing(false); setEditData(null); }}>Cancel</Button>
                  <Button className="flex-1" onClick={save}>Save changes</Button>
                </div>
              </div>
            )}
          </div>
        </div>
        <ConfirmDialog open={confirmDel} onClose={() => setConfirmDel(false)} onConfirm={doDelete}
          title="Delete transaction?" message="This cannot be undone." confirmLabel="Delete" />
        {viewingReceipt && <ReceiptViewer id={t.id} onClose={() => setViewingReceipt(false)} />}
      </Modal>
    );
  };

  // ========================================================================
  // Stat Detail Modal
  // ========================================================================
  const StatDetail = ({ type, onClose, openTransaction, onOpenReceipts }) => {
    const { transactions, money } = useApp();
    const cfg = {
      income:   { title: 'All income',    filter: t => t.type === 'income', amount: t => Number(t.amount || 0) + Number(t.tips || 0) },
      tips:     { title: 'All tips',      filter: t => t.type === 'income' && Number(t.tips) > 0, amount: t => Number(t.tips || 0) },
      expenses: { title: 'All expenses',  filter: t => t.type === 'expense', amount: t => Number(t.amount || 0) },
    }[type];
    const [period, setPeriod] = useState('month'); // 'month' | 'quarter' | 'year' | 'all'
    const [offset, setOffset] = useState(0); // 0 = current, -1 = previous, etc.
    if (!cfg) return null;

    const now = new Date();
    const periodCfg = useMemo(() => {
      if (period === 'month') {
        const ref = new Date(now.getFullYear(), now.getMonth() + offset, 1);
        return { label: ref.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }), start: startOfMonth(ref), end: endOfMonth(ref) };
      }
      if (period === 'quarter') {
        const ref = new Date(now.getFullYear(), now.getMonth() + offset * 3, 1);
        return { label: `Q${Math.floor(ref.getMonth() / 3) + 1} ${ref.getFullYear()}`, start: startOfQuarter(ref), end: endOfQuarter(ref) };
      }
      if (period === 'year') {
        const ref = new Date(now.getFullYear() + offset, 0, 1);
        return { label: String(ref.getFullYear()), start: startOfYear(ref), end: endOfYear(ref) };
      }
      return { label: 'All time', start: null, end: null };
    }, [period, offset]);

    const setPeriodAndReset = (p) => { setPeriod(p); setOffset(0); };

    const baseList = transactions.filter(cfg.filter);
    const list = (periodCfg.start && periodCfg.end)
      ? baseList.filter(t => inRange(t.date, periodCfg.start, periodCfg.end))
      : baseList;
    const total = list.reduce((s, t) => s + cfg.amount(t), 0);
    const receiptCount = type === 'expenses' ? list.filter(t => t.has_receipt).length : 0;

    const PeriodBtn = ({ value, label }) => (
      <button type="button" onClick={() => setPeriodAndReset(value)}
        className={`flex-1 h-9 rounded-lg text-sm font-medium transition ${period === value ? 'bg-white shadow-sm text-ink' : 'text-mute hover:text-ink'}`}>
        {label}
      </button>
    );

    const showNav = period !== 'all';
    const nextDisabled = offset >= 0;

    return (
      <Modal open={true} onClose={onClose} title={cfg.title}>
        <div className="p-5 border-b border-ink/10 bg-bg space-y-3">
          <div className="bg-cream p-1 rounded-xl flex">
            <PeriodBtn value="month" label="Monthly" />
            <PeriodBtn value="quarter" label="Quarterly" />
            <PeriodBtn value="year" label="Annual" />
            <PeriodBtn value="all" label="All" />
          </div>
          <div className="flex items-start justify-between gap-3">
            <div className="min-w-0">
              <div className="flex items-center gap-1 text-xs text-mute">
                {showNav && (
                  <button type="button" onClick={() => setOffset(o => o - 1)}
                    className="w-7 h-7 -ml-1 rounded-md hover:bg-cream flex items-center justify-center text-ink"
                    aria-label="Previous period">
                    <Icon name="chevronLeft" className="w-4 h-4" />
                  </button>
                )}
                <span className="text-ink font-medium">{periodCfg.label}</span>
                {showNav && (
                  <button type="button" onClick={() => !nextDisabled && setOffset(o => o + 1)}
                    disabled={nextDisabled}
                    className={`w-7 h-7 rounded-md flex items-center justify-center ${nextDisabled ? 'text-mute/30 cursor-not-allowed' : 'text-ink hover:bg-cream'}`}
                    aria-label="Next period">
                    <Icon name="chevronRight" className="w-4 h-4" />
                  </button>
                )}
                {showNav && offset !== 0 && (
                  <button type="button" onClick={() => setOffset(0)}
                    className="ml-1 text-[11px] text-brand-700 italic-serif hover:underline">today</button>
                )}
                <span className="ml-1 text-mute">· {list.length} {list.length === 1 ? 'entry' : 'entries'}</span>
              </div>
              <div className="text-2xl font-bold mt-1 text-ink">{money(total)}</div>
            </div>
            {type === 'expenses' && (
              <button type="button"
                onClick={() => { onClose(); setTimeout(() => onOpenReceipts && onOpenReceipts(), 100); }}
                className="inline-flex items-center gap-1.5 px-3 h-9 rounded-lg bg-paper border border-ink/15 text-ink text-sm font-medium hover:bg-cream transition shrink-0">
                <Icon name="image" className="w-4 h-4" />
                Receipts{receiptCount > 0 ? ` · ${receiptCount}` : ''}
              </button>
            )}
          </div>
        </div>
        <div className="overflow-y-auto p-3 max-h-[60vh]">
          {list.length === 0 ? (
            <div className="py-10 text-center text-mute text-sm">Nothing here for this period</div>
          ) : list.map(t => (
            <TransactionRow key={t.id} t={t} onClick={() => { onClose(); setTimeout(() => openTransaction(t.id), 100); }} />
          ))}
        </div>
      </Modal>
    );
  };

  // ========================================================================
  // Event Modal (create/edit CalendarEvent — optionally with pay = linked income)
  // ========================================================================
  const EventModal = ({ event, initialDate, onClose }) => {
    const {
      createEvent, updateEvent, deleteEvent,
      createTransaction, updateTransaction, deleteTransaction,
      transactions, events, settings, money,
    } = useApp();

    const venueSuggestions = useMemo(() => {
      const set = new Set();
      transactions.forEach(t => { if (t.venue) set.add(t.venue); });
      events.forEach(e => { if (e.venue) set.add(e.venue); });
      return Array.from(set);
    }, [transactions, events]);

    const isEdit = !!event;
    // Linked transaction (if this event represents income)
    const linkedTx = useMemo(() => {
      if (!event || !event.linked_transaction_id) return null;
      return transactions.find(t => t.id === event.linked_transaction_id) || null;
    }, [event, transactions]);

    const [form, setForm] = useState(() => ({
      title: event?.title || '',
      date: event?.date || initialDate || todayISO(),
      start_time: event?.start_time || '',
      end_time: event?.end_time || '',
      description: event?.description || '',
      color: event?.color || (linkedTx ? 'emerald' : 'indigo'),
      // Pay fields — pre-filled from linked transaction if present
      amount: linkedTx?.amount ?? '',
      tips: linkedTx?.tips ?? '',
      payment_method: linkedTx?.payment_method || settings.default_payment_method || 'bank_transfer',
      project: linkedTx?.project || '',
      venue: linkedTx?.venue || event?.venue || '',
    }));
    const [confirmDel, setConfirmDel] = useState(false);
    const [showPay, setShowPay] = useState(!!linkedTx);

    const hasPay = () => {
      const a = Number(form.amount || 0);
      const t = Number(form.tips || 0);
      return showPay && (a > 0 || t > 0);
    };
    const payTotal = Number(form.amount || 0) + Number(form.tips || 0);

    const eventFields = () => ({
      title: form.title.trim(),
      date: form.date,
      start_time: form.start_time || '',
      end_time: form.end_time || '',
      description: form.description || '',
      color: form.color,
      venue: form.venue.trim() || null,
    });

    const txFields = () => ({
      type: 'income',
      title: form.title.trim(),
      date: form.date,
      amount: Number(form.amount || 0),
      tips: Number(form.tips || 0),
      payment_method: form.payment_method,
      project: form.project.trim() || null,
      venue: form.venue.trim() || null,
      notes: form.description?.trim() || null,
    });

    const save = (e) => {
      e.preventDefault();
      if (!form.title.trim()) return;

      if (!isEdit) {
        // ---- Create flow ----
        if (hasPay()) {
          // Create transaction + auto-create linked event, customizing event fields.
          createTransaction(txFields(), {
            color: form.color,
            start_time: form.start_time,
            end_time: form.end_time,
            description: form.description,
          });
        } else {
          createEvent(eventFields());
        }
      } else {
        // ---- Edit flow ----
        if (linkedTx) {
          if (hasPay()) {
            // Both sides still exist — update both.
            updateEvent(event.id, eventFields());
            updateTransaction(linkedTx.id, txFields());
          } else {
            // Pay was cleared — demote to pure event, delete transaction.
            // 1) Unlink the event so deleteTransaction's cascade doesn't remove it.
            updateEvent(event.id, { ...eventFields(), linked_transaction_id: null });
            // 2) Delete the transaction.
            deleteTransaction(linkedTx.id);
          }
        } else {
          if (hasPay()) {
            // Promote pure event to income event: create transaction (skipping auto-event)
            // and link this event to it.
            const newTx = createTransaction(txFields(), 'skip');
            updateEvent(event.id, { ...eventFields(), linked_transaction_id: newTx.id });
          } else {
            // Plain event update.
            updateEvent(event.id, eventFields());
          }
        }
      }
      onClose && onClose();
    };

    const handleDelete = () => {
      if (linkedTx) {
        // Deleting the transaction also removes the linked event (cascade in context).
        deleteTransaction(linkedTx.id);
      } else {
        deleteEvent(event.id);
      }
      setConfirmDel(false);
      onClose && onClose();
    };

    const deleteMessage = linkedTx
      ? 'This event has income attached. Deleting will remove both the event and the income transaction. This cannot be undone.'
      : 'This cannot be undone.';

    return (
      <Modal open={true} onClose={onClose} title={isEdit ? 'Edit event' : 'New event'}>
        <form onSubmit={save} className="p-5 space-y-4 overflow-y-auto">
          {linkedTx && (
            <div className="bg-sage-50 border border-sage-200 rounded-xl p-3 text-xs text-sage-800 flex items-start gap-2">
              <Icon name="dollar" className="w-4 h-4 mt-0.5 shrink-0" />
              <div>
                <div className="font-semibold">Linked income · {money(Number(linkedTx.amount) + Number(linkedTx.tips || 0))}</div>
                <div className="mt-0.5 text-sage-700">Edits here also update the income transaction.</div>
              </div>
            </div>
          )}

          <div><Label>Title *</Label>
            <Input value={form.title} onChange={e => setForm({ ...form, title: e.target.value })} required />
          </div>
          <div><Label>Date</Label>
            <Input type="date" value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} />
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div><Label>Start time</Label>
              <Input type="time" value={form.start_time || ''} onChange={e => setForm({ ...form, start_time: e.target.value })} />
            </div>
            <div><Label>End time</Label>
              <Input type="time" value={form.end_time || ''} onChange={e => setForm({ ...form, end_time: e.target.value })} />
            </div>
          </div>

          {/* Pay section — toggleable for pure events, always shown for linked */}
          {!showPay ? (
            <button type="button" onClick={() => setShowPay(true)}
              className="w-full border-2 border-dashed border-ink/15 rounded-xl py-3 text-sm font-medium text-mute hover:border-brand-500 hover:text-brand-600 transition flex items-center justify-center gap-2">
              <Icon name="plus" className="w-4 h-4" /> Add pay / income to this event
            </button>
          ) : (
            <div className="bg-sage-50/50 border border-sage-200 rounded-xl p-3 space-y-3">
              <div className="flex items-center justify-between">
                <span className="text-xs font-semibold text-sage-800 uppercase tracking-wider">Income</span>
                {!linkedTx && (
                  <button type="button" onClick={() => { setShowPay(false); setForm({ ...form, amount: '', tips: '' }); }}
                    className="text-xs text-mute hover:text-ink">Remove</button>
                )}
              </div>
              <div className="grid grid-cols-2 gap-2">
                <div><Label className="mb-1">Payment</Label>
                  <Input type="number" step="0.01" min="0" value={form.amount}
                    onChange={e => setForm({ ...form, amount: e.target.value })} placeholder="0.00" />
                </div>
                <div><Label className="mb-1">Tips</Label>
                  <Input type="number" step="0.01" min="0" value={form.tips}
                    onChange={e => setForm({ ...form, tips: e.target.value })} placeholder="0.00" />
                </div>
              </div>
              {payTotal > 0 && (
                <div className="flex items-center justify-between bg-white rounded-lg px-3 py-2">
                  <span className="text-xs text-sage-700 font-medium">Total</span>
                  <span className="text-base font-bold text-sage-700">{money(payTotal)}</span>
                </div>
              )}
              <div><Label className="mb-1">Payment method</Label>
                <Select value={form.payment_method} onChange={e => setForm({ ...form, payment_method: e.target.value })}>
                  {PAYMENT_METHODS.map(p => <option key={p.value} value={p.value}>{p.label}</option>)}
                </Select>
              </div>
              <div><Label className="mb-1">Project / Client</Label>
                <Input value={form.project} onChange={e => setForm({ ...form, project: e.target.value })} placeholder="Optional" />
              </div>
              {linkedTx && payTotal === 0 && (
                <div className="text-xs text-ochre-700 bg-ochre-50 border border-ochre-100 rounded-lg px-3 py-2">
                  Clearing pay will remove the linked income transaction but keep the event.
                </div>
              )}
            </div>
          )}

          <div><Label>Venue</Label>
            <Input list="venue-list-em" value={form.venue} onChange={e => setForm({ ...form, venue: e.target.value })} placeholder="Optional" />
            <datalist id="venue-list-em">{venueSuggestions.map(v => <option key={v} value={v} />)}</datalist>
          </div>
          <div><Label>Notes</Label>
            <Textarea value={form.description || ''} onChange={e => setForm({ ...form, description: e.target.value })} />
          </div>
          <div><Label>Color</Label>
            <div className="flex gap-3">
              {EVENT_COLORS.map(c => (
                <button key={c} type="button" onClick={() => setForm({ ...form, color: c })}
                  className={`w-10 h-10 rounded-full ${COLOR_BG[c]} ${form.color === c ? `ring-4 ring-offset-2 ${COLOR_RING[c]}` : ''}`} />
              ))}
            </div>
          </div>
          <div className="flex gap-2 pt-2">
            {isEdit && (
              <Button type="button" variant="dangerGhost" onClick={() => setConfirmDel(true)}>
                <Icon name="trash" className="w-4 h-4" />
              </Button>
            )}
            <Button type="button" variant="secondary" className="flex-1" onClick={onClose}>Cancel</Button>
            <Button type="submit" className="flex-1">{isEdit ? 'Save' : 'Create'}</Button>
          </div>
        </form>
        <ConfirmDialog open={confirmDel} onClose={() => setConfirmDel(false)}
          onConfirm={handleDelete}
          title="Delete event?" message={deleteMessage} confirmLabel="Delete" />
      </Modal>
    );
  };

  // ========================================================================
  // Root App
  // ========================================================================
  const App = () => {
    const [page, setPage] = useState(() => {
      const hash = (location.hash || '').replace('#', '');
      const valid = ['dashboard','add','calendar','reports','projects','settings'];
      return valid.includes(hash) ? hash : 'dashboard';
    });

    useEffect(() => { location.hash = page; }, [page]);

    // Modal state
    const [openTxId, setOpenTxId] = useState(null);
    const [openEvent, setOpenEvent] = useState(null);  // { event } or { initialDate }
    const [statType, setStatType] = useState(null);
    const [openReceipts, setOpenReceipts] = useState(false);

    const openTransaction = (id) => setOpenTxId(id);
    const editEvent = (event) => setOpenEvent({ event });
    const newEventOnDate = (iso) => setOpenEvent({ initialDate: iso });

    let content = null;
    if (page === 'dashboard') content = <Dashboard setPage={setPage} openTransaction={openTransaction} openStat={setStatType} />;
    else if (page === 'add') content = <AddEntry setPage={setPage} />;
    else if (page === 'calendar') content = <Calendar setPage={setPage} openTransaction={openTransaction} openEvent={editEvent} createEventOnDate={newEventOnDate} />;
    else if (page === 'reports') content = <Reports setPage={setPage} openTransaction={openTransaction} />;
    else if (page === 'projects') content = <Projects setPage={setPage} openTransaction={openTransaction} />;
    else if (page === 'settings') content = <Settings setPage={setPage} />;

    return (
      <>
        <Layout page={page} setPage={setPage}>{content}</Layout>
        {openTxId && <TransactionDetail transactionId={openTxId} onClose={() => setOpenTxId(null)} />}
        {openEvent && <EventModal event={openEvent.event} initialDate={openEvent.initialDate} onClose={() => setOpenEvent(null)} />}
        {statType && <StatDetail type={statType} onClose={() => setStatType(null)}
          openTransaction={openTransaction} onOpenReceipts={() => setOpenReceipts(true)} />}
        {openReceipts && <ReceiptsGallery onClose={() => setOpenReceipts(false)} openTransaction={openTransaction} />}
      </>
    );
  };

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(
    <AppProvider>
      <App />
    </AppProvider>
  );
  </script>
</body>
</html>
